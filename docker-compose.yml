name: dermahealth

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: dermahealth
    ports:
      # Host port 5432 is occupied by a pre-existing native Homebrew postgresql@15
      # service on this machine (see docs/BACKEND_DEVIATIONS.md) — mapped to 5442
      # on the host to avoid silently connecting to the wrong database server.
      - '5442:5432'
    volumes:
      - dermahealth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d dermahealth']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host port 6379 is occupied by a pre-existing native redis-server on this
      # machine (see docs/BACKEND_DEVIATIONS.md) — mapped to 6389 on the host.
      - '6389:6379'
    volumes:
      - dermahealth_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dermahealth_minio_admin
      MINIO_ROOT_PASSWORD: dermahealth_minio_dev_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - dermahealth_minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8025/livez']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '3000:3000'
    command: sh -c "npm run db:migrate && npm run db:seed && npm run start:dev"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  dermahealth_postgres_data:
  dermahealth_redis_data:
  dermahealth_minio_data:
