name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Architecture boundaries + circular dependency check
        run: npm run arch:check

      - name: Build
        run: npm run build

      - name: Integration tests
        run: npm run test:integration

      - name: OpenAPI contract audit
        run: npm run contract:audit
