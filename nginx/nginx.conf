# Nginx trong docker compose (cùng network với carefollow-be).
# Container BE listen PORT=3000 — dùng carefollow-be:3000, không phải 43000 (43000 là port map ra host).

upstream carefollow_be {
    server carefollow-be:3000;
}

server {
    listen 80;
    server_name dermahealth.fitdnu.id.vn 192.168.167.251;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 25m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Nest API (không có global prefix /api — login: /authenticator/user/login)
    location ~ ^/(authenticator|adminapi|bpmapi|notification|health|sale|api)(/|$) {
        proxy_pass http://carefollow_be;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /docs {
        return 301 /api/docs;
    }

    location ~* \.(?:css|js|mjs|ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — đặt sau các location API; POST vào đây sẽ 405
    location / {
        try_files $uri $uri/ /index.html;
    }
}
